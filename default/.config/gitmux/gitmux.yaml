tmux:
  symbols:
    branch:     ' '
    hashprefix: ':'
    ahead:      '+·'
    behind:     '-·'
    staged:     'A'
    conflict:   '✖'
    modified:   'M'
    untracked:  '?'
    stashed:    '⚑'
    clean:      '✔'
    insertions: 'I'
    deletions:  'D'
  styles:
    clear:      '#[fg=default]'
    state:      '#[fg=red,bold]'
    branch:     '#[fg=default,bold]'
    remote:     '#[fg=#0000ff]'
    divergence: '#[fg=default]'
    staged:     '#[fg=green,bold]'
    conflict:   '#[fg=red,bold]'
    modified:   '#[fg=red,bold]'
    untracked:  '#[fg=magenta,bold]'
    stashed:    '#[fg=cyan,bold]'
    clean:      '#[fg=green,bold]'
    insertions: '#[fg=green]'
    deletions:  '#[fg=red]'
  layout: [branch, '|', remote-branch, divergence, ' ', flags]
  options:
    branch_max_len:   15
    branch_trim:      right
    ellipsis:         …
    hide_clean:       false
    swap_divergence:  false
    divergence_space: false
